<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人記帳系統</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2c3e50;
            --header-text: #666;
            --input-border: #ddd;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #e0e0e0;
            --header-text: #aaa;
            --input-border: #444;
        }

        body {
            font-family: -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 10px; color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 500px; margin: 0 auto; position: relative; }
        
        .theme-toggle {
            position: absolute;
            right: 0;
            top: -5px;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
        }

        .summary-section {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white !important;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .month-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .month-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .summary-section h3 { margin: 0; font-size: 0.9rem; opacity: 0.8; color: white; }
        .summary-section h1 { margin: 5px 0; font-size: 2.2rem; color: white; }
        
        .budget-info {
            font-size: 0.85rem;
            margin-top: 5px;
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .budget-info input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            color: white;
            width: 70px;
            padding: 2px;
            text-align: right;
            font-size: 0.85rem;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .analysis-item { font-size: 0.85rem; }

        .input-card {
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, select, textarea {
            padding: 12px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--card);
            color: var(--text);
        }
        textarea { height: 60px; resize: none; }
        .btn-group { display: flex; gap: 8px; }
        button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: var(--bg); color: var(--header-text); font-size: 0.8rem; border: 1px solid var(--input-border); }

        .search-box {
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            font-size: 0.9rem;
        }

        .list-header { font-weight: bold; margin: 15px 0 8px 5px; color: var(--header-text); }
        .item-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .info { flex: 1; position: relative; }
        .info b { display: block; font-size: 1.1rem; }
        .info small { color: #888; display: block; margin-top: 4px; }
        .info .note { color: var(--header-text); font-style: italic; font-size: 0.85rem; margin-top: 5px; }
        
        .amount { font-weight: bold; color: #e74c3c; font-size: 1.1rem; margin-right: 10px; }
        
        .tag-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.05);
            color: var(--accent);
            font-size: 0.75rem;
        }
        
        .action-area { display: flex; align-items: center; }
        .edit-btn { 
            color: var(--accent); 
            cursor: pointer; 
            font-size: 1.4rem;
            opacity: 0.5; 
            padding: 5px;
        }
        .edit-btn:active { opacity: 1; transform: scale(1.1); }
        
        .del-btn { color: #ccc; cursor: pointer; font-size: 1.5rem; padding: 5px; }
        .del-btn:hover { color: #e74c3c; }

        #importFile { display: none; }
    </style>
</head>
<body data-theme="light">

<div class="container" id="top">
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>

    <div class="summary-section">
        <div class="month-selector">
            <button class="month-btn" onclick="changeMonth(-1)">◀ 上個月</button>
            <h3 id="monthTitle">2026/03 總支出</h3>
            <button class="month-btn" onclick="changeMonth(1)">下個月 ▶</button>
        </div>
        <h1 id="totalMonth">$0</h1>
        <div class="budget-info">
            <span>月預算：$<input type="number" id="budgetInput" oninput="updateBudget()" placeholder="未設定"></span>
            <span id="remainingAmount">剩餘：$0</span>
        </div>
        <div class="analysis-grid" id="analysisBox"></div>
    </div>

    <div class="input-card">
        <div style="display:flex; gap:10px">
            <input type="date" id="date" style="flex:1">
            <select id="method" style="flex:1">
                <option value="現金">現金</option>
                <option value="信用卡">信用卡</option>
                <option value="電子支付">電子支付</option>
            </select>
        </div>
        <select id="category">
            <option value="食">分類：食</option>
            <option value="衣">分類：衣</option>
            <option value="住">分類：住</option>
            <option value="行">分類：行</option>
            <option value="育">分類：育</option>
            <option value="樂">分類：樂</option>
            <option value="保險">分類：保險</option>
            <option value="其他">分類：其他</option>
        </select>
        <input type="text" id="desc" placeholder="消費項目 (例如: 看電影)">
        <input type="number" id="amount" placeholder="金額" inputmode="numeric">
        <textarea id="note" placeholder="備註 (選填)"></textarea>
        <button class="btn-main" onclick="addRecord()">新增這筆紀錄</button>
        <div class="btn-group">
            <button class="btn-sub" onclick="exportJSON()">匯出資料</button>
            <button class="btn-sub" onclick="document.getElementById('importFile').click()">匯入資料</button>
        </div>
        <input type="file" id="importFile" accept=".json" onchange="importJSON(event)">
    </div>

    <div class="list-header">近期消費明細</div>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋項目或備註..." oninput="render()">
    <div id="recordList"></div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('expense_v2')) || [];
    let budgets = JSON.parse(localStorage.getItem('monthly_budgets')) || {};
    let currentViewDate = new Date(); 
    
    if (localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
    }

    document.getElementById('date').valueAsDate = new Date();

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    }

    function getYearMonthKey() {
        const viewYear = currentViewDate.getFullYear();
        const viewMonth = currentViewDate.getMonth() + 1;
        return `${viewYear}-${String(viewMonth).padStart(2, '0')}`;
    }

    function updateBudget() {
        const key = getYearMonthKey();
        const val = document.getElementById('budgetInput').value;
        budgets[key] = val;
        localStorage.setItem('monthly_budgets', JSON.stringify(budgets));
        renderBudgetStats();
    }

    function changeMonth(offset) {
        currentViewDate.setMonth(currentViewDate.getMonth() + offset);
        render();
    }

    function renderBudgetStats(forceTotal = null) {
        const key = getYearMonthKey();
        const currentBudget = budgets[key] || 0;
        document.getElementById('budgetInput').value = currentBudget || "";
        
        const remainingDisplay = document.getElementById('remainingAmount');
        const total = forceTotal !== null ? forceTotal : calculateCurrentMonthTotal();

        if (currentBudget > 0) {
            const remain = currentBudget - total;
            remainingDisplay.innerText = `剩餘：$${remain.toLocaleString()}`;
            const threshold = currentBudget * 0.1;
            
            if (remain < 0) {
                remainingDisplay.style.color = "#ff8a8a"; 
            } else if (remain <= threshold) {
                remainingDisplay.style.color = "#ff0000"; 
                remainingDisplay.style.fontWeight = "bold";
            } else {
                remainingDisplay.style.color = "white";
                remainingDisplay.style.fontWeight = "normal";
            }
        } else {
            remainingDisplay.innerText = "尚未設定預算";
            remainingDisplay.style.color = "white";
        }
    }

    function calculateCurrentMonthTotal() {
        const currentMonthStr = getYearMonthKey();
        return records
            .filter(re => re.date.startsWith(currentMonthStr))
            .reduce((sum, re) => sum + Number(re.amount), 0);
    }

    function render() {
        const list = document.getElementById('recordList');
        const monthTotalDisplay = document.getElementById('totalMonth');
        const analysisBox = document.getElementById('analysisBox');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        list.innerHTML = '';
        analysisBox.innerHTML = '';
        
        const currentMonthStr = getYearMonthKey();
        document.getElementById('monthTitle').innerText = `${currentMonthStr.replace('-','/')} 總支出`;

        let total = 0;
        let stats = {};

        records.sort((a, b) => new Date(b.date) - new Date(a.date));

        records.forEach((re, index) => {
            const isThisMonth = re.date.startsWith(currentMonthStr);
            const tag = re.category || '其他'; // 使用儲存的分類

            if (isThisMonth) {
                total += Number(re.amount);
                stats[tag] = (stats[tag] || 0) + Number(re.amount);
            }

            const matchesSearch = re.desc.toLowerCase().includes(searchTerm) || 
                                 (re.note && re.note.toLowerCase().includes(searchTerm));

            if (matchesSearch) {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="info">
                        <div class="tag-row">
                            <span class="tag">${tag}</span>
                            <span class="edit-btn" onclick="editRecord(${index})">✎</span>
                        </div>
                        <b>${re.desc}</b>
                        <small>${re.date} · ${re.method}</small>
                        ${re.note ? `<div class="note">註：${re.note}</div>` : ''}
                    </div>
                    <div class="action-area">
                        <div class="amount">$${Number(re.amount).toLocaleString()}</div>
                        <span class="del-btn" onclick="deleteRecord(${index})">×</span>
                    </div>
                `;
                list.appendChild(card);
            }
        });

        const sortedTags = Object.keys(stats).sort((a, b) => stats[b] - stats[a]);
        if (total > 0) {
            sortedTags.forEach(tag => {
                const perc = ((stats[tag] / total) * 100).toFixed(0);
                analysisBox.innerHTML += `<div class="analysis-item">${tag}: $${stats[tag].toLocaleString()} (${perc}%)</div>`;
            });
        } else {
            analysisBox.innerHTML = '<div class="analysis-item" style="grid-column: 1/3; opacity: 0.6;">本月尚無消費紀錄</div>';
        }

        monthTotalDisplay.innerText = `$${total.toLocaleString()}`;
        renderBudgetStats(total);
        localStorage.setItem('expense_v2', JSON.stringify(records));
    }

    function addRecord() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const method = document.getElementById('method').value;
        const category = document.getElementById('category').value; // 取得選取分類
        const note = document.getElementById('note').value;

        if (!desc || !amount) return alert('請填寫項目與金額');

        records.push({ date, desc, amount, method, category, note });
        currentViewDate = new Date(date);
        render();

        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('note').value = '';
        // 分類選單不重置，方便連續輸入同類型消費
    }

    function editRecord(i) {
        const item = records[i];
        document.getElementById('date').value = item.date;
        document.getElementById('method').value = item.method;
        document.getElementById('category').value = item.category || "其他"; // 帶回分類
        document.getElementById('desc').value = item.desc;
        document.getElementById('amount').value = item.amount;
        document.getElementById('note').value = item.note || "";
        
        records.splice(i, 1);
        render();
        document.getElementById('top').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteRecord(i) {
        if (confirm('確定刪除這筆紀錄？')) {
            records.splice(i, 1);
            render();
        }
    }

    function exportJSON() {
        const now = new Date();
        const dateStr = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
        const fileName = `支出備份_${dateStr}.json`;
        const blob = new Blob([JSON.stringify({records, budgets}, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importJSON(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = JSON.parse(evt.target.result);
                if (Array.isArray(data)) {
                    records = data;
                } else {
                    records = data.records || [];
                    budgets = data.budgets || {};
                }
                localStorage.setItem('monthly_budgets', JSON.stringify(budgets));
                render();
                alert('匯入成功！');
            } catch (err) { alert('檔案格式不正確'); }
        };
        reader.readAsText(file);
    }

    render();
</script>

</body>
</html>
